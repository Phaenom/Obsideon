<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Obsidian Action Items</title>
<link rel="icon" href="icon.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="bar">
        <div class="bar-left">
            <svg class="logo" viewBox="0 0 24 24" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2 L20 7 V17 L12 22 L4 17 V7 Z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="title-block">
                <h1>Action Items</h1>
                <span id="note-title" class="note-title">&nbsp;</span>
            </div>
            <span id="count-badge" class="badge">0</span>
        </div>
        <div class="bar-right">
            <span id="updated-at" class="updated">--:--:--</span>
            <button id="add-section-btn" class="text-btn" title="Add new section" aria-label="Add new section">+ Section</button>
            <div class="hidden-groups-wrap">
                <button id="hidden-groups-btn" class="icon-btn hidden" title="Hidden sections" aria-label="Hidden sections">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                        <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span id="hidden-groups-count" class="hidden-count-badge">0</span>
                </button>
                <div id="hidden-groups-menu" class="dropdown-menu hidden"></div>
            </div>
            <button id="open-note-btn" class="icon-btn" title="Open note in Obsidian" aria-label="Open note in Obsidian">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 3h7v7M21 3l-9 9M10 5H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button id="refresh-btn" class="icon-btn" title="Refresh now" aria-label="Refresh now">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5.5 15a8 8 0 1 0 1-9.5L4 8M18.5 9a8 8 0 0 1-1 9.5L20 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </header>

    <main id="section-rail" class="rail"></main>

    <section id="empty-state" class="state-panel hidden">
        <div class="state-icon">&#10003;</div>
        <p>All clear &mdash; no open action items.</p>
    </section>

    <section id="error-state" class="state-panel hidden">
        <div class="state-icon error">&#33;</div>
        <p id="error-message">Can't reach the bridge server.</p>
        <p class="state-sub">Make sure <code>node bridge/server.js</code> is running on this PC.</p>
        <button id="retry-btn" class="retry-btn">Retry</button>
    </section>

    <template id="section-template">
        <article class="card">
            <div class="card-head">
                <span class="section-name"></span>
                <div class="card-meta">
                    <span class="section-count"></span>
                    <button class="add-task-btn" title="Add task" aria-label="Add task">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button class="collapse-btn" title="Hide section" aria-label="Hide section">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="item-list"></div>
        </article>
    </template>

    <template id="item-template">
        <div class="item">
            <button class="check-btn" title="Close out" aria-label="Close out">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <span class="item-text"></span>
            <span class="due-pill hidden"></span>
        </div>
    </template>

    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal-box task-modal-box">
            <div class="modal-header">
                <h2 class="modal-title">New Task</h2>
                <span id="task-modal-section" class="modal-section-label"></span>
            </div>
            <input id="task-text-input" class="modal-input" type="text" placeholder="Task description…" autocomplete="off" />
            <div class="task-modal-meta">
                <input id="task-date-input" class="modal-date" type="date" title="Due date" />
                <div class="priority-picker-lg" role="group" aria-label="Priority">
                    <button type="button" class="priority-btn-lg" data-priority="highest">
                        <span class="p-emoji">🔺</span><span class="p-label">Highest</span>
                    </button>
                    <button type="button" class="priority-btn-lg" data-priority="high">
                        <span class="p-emoji">⏫</span><span class="p-label">High</span>
                    </button>
                    <button type="button" class="priority-btn-lg selected" data-priority="normal">
                        <span class="p-emoji">·</span><span class="p-label">Normal</span>
                    </button>
                    <button type="button" class="priority-btn-lg" data-priority="low">
                        <span class="p-emoji">🔽</span><span class="p-label">Low</span>
                    </button>
                    <button type="button" class="priority-btn-lg" data-priority="lowest">
                        <span class="p-emoji">⏬</span><span class="p-label">Lowest</span>
                    </button>
                </div>
            </div>
            <div class="modal-actions">
                <button id="task-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="task-submit-btn" class="modal-btn modal-btn-confirm">Add Task</button>
            </div>
        </div>
    </div>

    <div id="section-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="modal-title">New Section</h2>
            <input id="section-name-input" class="modal-input" type="text" placeholder="Section name…" autocomplete="off" />
            <div class="modal-actions">
                <button id="section-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="section-submit-btn" class="modal-btn modal-btn-confirm">Add Section</button>
            </div>
        </div>
    </div>

    <script>
        // iCUE host lifecycle hooks. Harmless in a plain browser (never fired). On the
        // XENEON EDGE, onICUEInitialized runs once the iCUE API is ready; it delegates to
        // app.js (which sets window.__onICUEReady). onDataUpdated is a no-op since this
        // widget has no host-configurable parameters.
        window.icueEvents = {
            onICUEInitialized: function () { if (window.__onICUEReady) window.__onICUEReady(); },
            onDataUpdated: function () {}
        };
    </script>
    <script src="app.js"></script>
</body>
</html>
